<!DOCTYPE html>
<html>
<head>
    <title>MiniMax Skill - Query Review</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        .item { background: #fff; border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .trigger { color: #2e7d32; }
        .no-trigger { color: #c62828; }
        textarea { width: 100%; height: 60px; }
        button { background: #0066cc; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>MiniMax Skill - Query Review</h1>
    <pre id="desc" style="background:#f5f5f5;padding:15px;"></pre>
    <div id="queries"></div>
    <button onclick="exportEvalSet()">Export Eval Set</button>
    <script>
        const data = __EVAL_DATA__;
        document.getElementById('desc').textContent = "__SKILL_DESC__";
        data.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span class="${item.should_trigger ? 'trigger' : 'no-trigger'}">[${item.should_trigger ? 'SHOULD' : 'NOT'} TRIGGER]</span>
                <textarea id="q${i}">${item.query}</textarea>
                <label><input type="checkbox" id="t${i}" ${item.should_trigger?'checked':''}> Should trigger</label>`;
            document.getElementById('queries').appendChild(div);
        });
        function exportEvalSet() {
            const exported = data.map((_, i) => ({ query: document.getElementById('q'+i).value, should_trigger: document.getElementById('t'+i).checked }));
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(exported, null, 2)], {type:'application/json'})); a.download = 'eval_set.json'; a.click();
        }
    </script>
</body>
</html>
